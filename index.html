  dw.forEach(k=>{const s=String(k)===w;
    h+='<th onclick="ss('+k+')" class="'+(s?'ws ':'')+''+(sC===k?(sD>0?'sa':'sd'):'')+'">'+k+'주</th>'});
  h+='<th onclick="ss(\\x27tt\\x27)" class="'+(sC==='tt'?(sD>0?'sa':'sd'):'')+'">합계</th></tr></thead><tbody>';
  pi.forEach(it=>{
    const d=(it.data[y]||{})[t]||{};const tot=Object.values(d).reduce((s,v)=>s+v,0);
    h+='<tr><td class="lb">'+it.cat+'</td><td class="lb">'+it.sub+'</td><td class="lb" title="'+it.name+'">'+it.name+'</td><td>'+it.code+'</td>';
    dw.forEach(k=>{const v=d[k]||0;const s=String(k)===w;
      h+='<td class="'+(s?'ws':'')+'">'+(v?FM(v):'')+'</td>'});
    h+='<td style="font-weight:700;color:#fbbf24">'+FM(tot)+'</td></tr>'});
  h+='<tr class="tot"><td class="lb">합계</td><td></td><td></td><td></td>';
  dw.forEach(k=>{h+='<td>'+FM(wt[k]||0)+'</td>'});
  h+='<td>'+FM(ta)+'</td></tr></tbody>';
  document.getElementById('mt').innerHTML=h;
  document.getElementById('tt').textContent=y+'년 '+tl+(ws?' - '+w+'주차':'');
  document.getElementById('tc').textContent=f.length+'개 품목 ('+(PG+1)+'/'+Math.max(tp,1)+'페이지)';

  let pg='<button onclick="PG=0;go()" '+(PG===0?'disabled':'')+'>◀◀</button>';
  pg+='<button onclick="PG=Math.max(0,PG-1);go()" '+(PG===0?'disabled':'')+'>◀</button>';
  for(let p=Math.max(0,PG-3);p<Math.min(tp,PG+4);p++)
    pg+='<button onclick="PG='+p+';go()" class="'+(p===PG?'on':'')+'">'+( p+1)+'</button>';
  pg+='<button onclick="PG=Math.min('+(tp-1)+',PG+1);go()" '+(PG>=tp-1?'disabled':'')+'>▶</button>';
  pg+='<button onclick="PG='+(tp-1)+';go()" '+(PG>=tp-1?'disabled':'')+'>▶▶</button>';
  document.getElementById('pg').innerHTML=pg;
}

function ss(c){if(sC===c)sD*=-1;else{sC=c;sD=-1}PG=0;go()}

function xcsv(){
  const{f,y,t}=gf();const tl=t==='qty'?'수량':'매출';
  let c='\uFEFF대분류,중분류,코드,품목명,'+WK.map(w=>w+'주').join(',')+',합계\n';
  f.forEach(it=>{const d=(it.data[y]||{})[t]||{};
    const tot=Object.values(d).reduce((s,v)=>s+v,0);
    c+='"'+it.cat+'","'+it.sub+'",'+it.code+',"'+it.name+'",'+WK.map(w=>d[w]||0).join(',')+','+tot+'\n'});
  const b=new Blob([c],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=y+'_'+tl+'_'+new Date().toISOString().split('T')[0]+'.csv';a.click()}

init();go();
</script></body></html>
